apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{.Release.Name}}-hpa
  labels: 
    {{- include "chart.labels" . | indent 4}}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{.Release.Name}}-deployment
  minReplicas: {{.Values.resources.hpa.minReplicas}}
  maxReplicas: {{.Values.resources.hpa.maxReplicas}}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{.Values.resources.hpa.cpu.utilization}}
