apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{.Release.Name}}-dest-rule
  namespace: {{.Release.Namespace}}
spec:
  host: {{.Release.Name}}-svc.{{.Release.Namespace}}.svc.cluster.local
  subsets:
  - name: v1
    labels:
      version: {{.Values.app.version}}
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL